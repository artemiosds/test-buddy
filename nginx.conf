server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fallback de SPA: qualquer rota não encontrada como arquivo
    # cai no index.html, para o React Router assumir o roteamento
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash no nome (gerados pelo Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html nunca deve ser cacheado, para novas versões
    # do deploy aparecerem sem precisar de hard refresh
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
